name: Build and Deploy Docs

on:
  push:
    paths:
      - 'docs/**'
      - 'frontrun/**'
      - '.github/workflows/docs.yml'
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build and deploy docs from (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: "pages-main"
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Inject release version
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ inputs.ref || github.ref_name }}"
          if [[ $VERSION =~ ^v(.+)$ ]]; then VERSION="${BASH_REMATCH[1]}"; fi
          python3 -c "
          import re, pathlib
          p = pathlib.Path('Cargo.toml')
          p.write_text(re.sub(r'^version = .*', 'version = \"${VERSION}\"', p.read_text(), count=1, flags=re.MULTILINE))
          "

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e .[dev]

      - name: Build Rust DPOR extension
        run: |
          source .venv/bin/activate
          pip install maturin
          maturin develop --release

      - name: Build documentation
        run: |
          source .venv/bin/activate
          make docs-html SPHINXBUILD=sphinx-build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          keep_files: true
          exclude_assets: 'debug'
